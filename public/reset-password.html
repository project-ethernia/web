<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>ETHERNIA - Új jelszó beállítása</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="login.css">
</head>

<body>
  <div class="nav">
    <div class="nav-inner">
      <div class="logo">ETHERNIA</div>
      <div class="nav-links">
        <a href="index.html">Főoldal</a>
        <a href="rules.html">Szabályzat</a>
        <a href="staff.html">Csapattagok</a>
        <a href="/punishments">Büntetések</a>
      </div>
    </div>
  </div>

  <main class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-title">Új jelszó beállítása</h1>
      <p class="auth-subtitle">
        Add meg az <span>új jelszavadat</span>, majd jelentkezz be a fiókodba.
      </p>

      <!--
        Ha lesz backend:
        action="/reset-password" (POST)
        A token általában query param-ból jön (?token=XYZ),
        vagy hidden inputként kerül a formba.
      -->
      <form class="auth-form" action="/reset-password" method="POST">
        <!-- Példa hidden mezőre, ha a backend így várja -->
        <input type="hidden" name="token" value="">

        <div class="form-group">
          <label for="password">Új jelszó</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          >
        </div>

        <div class="form-group">
          <label for="password_confirmation">Új jelszó megerősítése</label>
          <input
            type="password"
            id="password_confirmation"
            name="password_confirmation"
            placeholder="••••••••"
            required
          >
        </div>

        <p class="auth-note">
          Biztonsági okokból a jelszó módosítása után újra be kell jelentkezned.
        </p>

        <button type="submit" class="btn auth-btn">
          Jelszó módosítása
        </button>
      </form>

      <div class="auth-footer-text">
        Kész vagy?
        <a href="login.html" class="link-accent">Vissza a bejelentkezéshez</a>
      </div>
    </div>
  </main>

  <footer>
    &copy; <span id="year"></span> ETHERNIA &middot; Nem hivatalos Minecraft oldal.
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
